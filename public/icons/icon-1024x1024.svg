<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#152a45"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </radialGradient>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="85%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e8e8e8"/>
    </radialGradient>
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.086  0 0 0 0 0.639  0 0 0 0 0.290  0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.086  0 0 0 0 0.639  0 0 0 0 0.290  0 0 0 0.4 0"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="216" fill="url(#bgGrad)"/>

  <!-- Estrela sutil atrás da bola -->
  <g transform="translate(512, 512)" opacity="0.12">
    <polygon points="0,-240 56,-76 220,-76 88,20 136,180 0,84 -136,180 -88,20 -220,-76 -56,-76" fill="#16a34a" filter="url(#starGlow)"/>
  </g>

